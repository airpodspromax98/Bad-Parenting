<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/bad-parenting/">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Clever | Portal</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    /* 1. RESET & TOPBAR */
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background: #000; font-family: Arial, sans-serif;
    }

    #topbar {
      position: fixed; top: 0; left: 0; width: 100%; height: 60px;
      background-color: #FFFFFF; color: black; display: flex;
      align-items: center; padding: 0 15px; z-index: 10000;
    }
    #topbar img { height: 40px; margin-right: 12px; }
    #topbar a { color: black; text-decoration: none; font-size: 20px; font-weight: 500; }

    /* 2. GAME CONTAINER (Pushed down 60px) */
    #unity-container {
      position: fixed;
      top: 60px; /* Offset for topbar */
      left: 0;
      width: 100%;
      height: calc(100% - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #unity-canvas { width: 100%; height: 100%; background: #000; cursor: crosshair; }

    #unity-loading-bar {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%); width: 50%; height: 20px;
      background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden;
    }
    #unity-progress-bar-full { height: 100%; width: 0%; background: #09f; transition: width 0.2s ease; }
  </style>
</head>
<body>

  <div id="topbar">
    <img src="https://lh3.googleusercontent.com/a-/ALV-UjWQneu0wwz9oqOIrJuC-rEk16wbmHPB_n6DEY2AUPRoiQYTQZs=s240-p-k-rw-no" alt="Logo">
    <a href="https://sites.google.com/view/bobsgwebsite/home">Clever | Portal</a>
  </div>

  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>

  <script>
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");

    // 3. POINTER LOCK FIX (Prevents 360 Spin)
    canvas.addEventListener("mousedown", () => {
      canvas.requestPointerLock = canvas.requestPointerLock || canvas.mozRequestPointerLock;
      canvas.requestPointerLock();
    });

    function unityShowBanner(msg, type) {}

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/Build.loader.js";

    async function loadSplitData(baseUrl, parts) {
      const chunks = [];
      for (let i = 1; i <= parts; i++) {
        const partUrl = `${baseUrl}.part${i}`;
        const response = await fetch(partUrl);
        if (!response.ok) throw new Error(`Failed to load ${partUrl}`);
        const chunk = await response.arrayBuffer();
        chunks.push(chunk);
        progressBarFull.style.width = (i / parts) * 30 + "%";
      }
      const mergedBlob = new Blob(chunks);
      return URL.createObjectURL(mergedBlob);
    }

    const config = {
      dataUrl: buildUrl + "/Build.data",
      frameworkUrl: buildUrl + "/Build.framework.js",
      codeUrl: buildUrl + "/Build.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "twoootwo",
      productName: "Bad Parenting 1",
      productVersion: "1.0",
      showBanner: unityShowBanner,
    };

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight - 60; // Adjusted for topbar
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    loadingBar.style.display = "block";

    Promise.all([
      loadSplitData("Build/Build.wasm", 2),
      loadSplitData("Build/Build.data", 3)
    ])
    .then(([wasmUrl, dataUrl]) => {
      config.codeUrl = wasmUrl;
      config.dataUrl = dataUrl;

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 30 + (70 * progress) + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          URL.revokeObjectURL(wasmUrl);
          URL.revokeObjectURL(dataUrl);
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    })
    .catch((error) => {
      alert("Failed to load game data: " + error.message);
    });
  </script>
</body>
</html>
